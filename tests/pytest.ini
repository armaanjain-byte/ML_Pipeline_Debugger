# FILE: pytest.ini

[pytest]

# ============================================================================
# TEST DISCOVERY
# ============================================================================

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

# ============================================================================
# OUTPUT
# ============================================================================

addopts =
    -ra
    -q
    --strict-markers
    --disable-warnings

# ============================================================================
# LOGGING
# ============================================================================

log_cli = true

log_cli_level = INFO

log_cli_format =
    [%(asctime)s] [%(levelname)s] %(message)s

log_cli_date_format =
    %Y-%m-%d %H:%M:%S

# ============================================================================
# WARNINGS
# ============================================================================

filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning

# ============================================================================
# CUSTOM MARKERS
# ============================================================================

markers =
    integration: end-to-end integration tests
    slow: computationally expensive tests
    dashboard: dashboard rendering tests
    schema: schema contract tests
    telemetry: telemetry validation tests
    observability: observability analysis tests

# ============================================================================
# MINIMUM VERSION
# ============================================================================

minversion = 8.0

# ============================================================================
# CACHE
# ============================================================================

cache_dir = .pytest_cache

# ============================================================================
# TIMEOUT SAFETY
# ============================================================================

faulthandler_timeout = 120
